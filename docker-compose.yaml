version: "3.9"

# ═══════════════════════════════════════════════════════════════
# Nerve IDP — Master Docker Compose
#
# Phase 1: Infrastructure (all running)
# Phase 2: + gateway, catalog, enforcer, pipeline, workers (active)
# Phase 3: + blast-radius, error-budget, cost-intelligence, maturity, security (commented)
# Phase 4: + ai-copilot, docs, chaos, fleet (commented)
#
# Usage:
#   docker compose up -d
#   docker compose up -d postgres redis neo4j vault
#   docker compose logs -f catalog
#   docker compose down -v
# ═══════════════════════════════════════════════════════════════

networks:
  nerve:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  neo4j_data:
  neo4j_logs:
  vault_data:
  prometheus_data:
  grafana_data:

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

x-db-env: &db-env
  DATABASE_URL: postgresql+asyncpg://nerve_app:nerve_app_secret@pgbouncer:6432/nerve
  DATABASE_URL_SYNC: postgresql+psycopg2://nerve_app:nerve_app_secret@pgbouncer:6432/nerve
  DATABASE_URL_MIGRATIONS: postgresql+psycopg2://nerve:nerve_dev_secret@postgres:5432/nerve

x-redis-env: &redis-env
  REDIS_URL: redis://:nerve_redis_secret@redis:6379/0

x-neo4j-env: &neo4j-env
  NEO4J_URI: bolt://neo4j:7687
  NEO4J_USER: neo4j
  NEO4J_PASSWORD: nerve_neo4j_secret

x-otel-env: &otel-env
  OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317

x-app-env: &app-env
  <<: [*db-env, *redis-env, *neo4j-env, *otel-env]
  ENVIRONMENT: ${ENVIRONMENT:-development}
  VAULT_URL: http://vault:8200
  VAULT_TOKEN: ${VAULT_TOKEN:-nerve-vault-dev-token}
  OPA_URL: http://opa:8181
  TEMPORAL_HOST: temporal
  TEMPORAL_PORT: "7233"
  PROMETHEUS_URL: http://prometheus:9090
  JAEGER_URL: http://jaeger:16686
  JWT_SECRET_KEY: ${JWT_SECRET_KEY:-nerve-jwt-dev-secret-change-in-production}
  NERVE_INTERNAL_TOKEN: ${NERVE_INTERNAL_TOKEN:-nerve-internal-dev-token}
  GITHUB_TOKEN: ${GITHUB_TOKEN:-}
  GITHUB_ORG: ${GITHUB_ORG:-}
  ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
  SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-}
  AWS_REGION: ${AWS_REGION:-us-east-1}
  AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
  AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
  TERRAFORM_CLOUD_TOKEN: ${TERRAFORM_CLOUD_TOKEN:-}
  CATALOG_SERVICE_URL: http://catalog:8000
  ENFORCER_SERVICE_URL: http://enforcer:8000
  PIPELINE_SERVICE_URL: http://pipeline:8000
  BLAST_RADIUS_SERVICE_URL: http://blast-radius:8000
  ERROR_BUDGET_SERVICE_URL: http://error-budget:8000
  COST_SERVICE_URL: http://cost-intelligence:8000
  MATURITY_SERVICE_URL: http://maturity:8000
  SECURITY_SERVICE_URL: http://security:8000

services:

  # ═══════════════════════════════════════════
  # PHASE 1 — INFRASTRUCTURE
  # ═══════════════════════════════════════════

  postgres:
    image: pgvector/pgvector:pg15
    container_name: nerve-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: nerve
      POSTGRES_USER: nerve
      POSTGRES_PASSWORD: nerve_dev_secret
    command: >
      postgres -c max_connections=200 -c shared_buffers=256MB
        -c effective_cache_size=768MB -c work_mem=4MB
        -c log_min_duration_statement=1000
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./phase-1/infra/docker/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nerve -d nerve"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - nerve
    logging: *default-logging

  pgbouncer:
    image: bitnami/pgbouncer:1.22.1
    container_name: nerve-pgbouncer
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRESQL_HOST: postgres
      POSTGRESQL_PORT: "5432"
      POSTGRESQL_DATABASE: nerve
      POSTGRESQL_USERNAME: nerve
      POSTGRESQL_PASSWORD: nerve_dev_secret
      PGBOUNCER_DATABASE: nerve
      PGBOUNCER_PORT: "6432"
      PGBOUNCER_POOL_MODE: transaction
      PGBOUNCER_MAX_CLIENT_CONN: "1000"
      PGBOUNCER_DEFAULT_POOL_SIZE: "20"
      PGBOUNCER_MIN_POOL_SIZE: "5"
      PGBOUNCER_RESERVE_POOL_SIZE: "5"
      PGBOUNCER_LOG_CONNECTIONS: "0"
    ports:
      - "6432:6432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -p 6432 -U nerve"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - nerve
    logging: *default-logging

  redis:
    image: redis:7.2-alpine
    container_name: nerve-redis
    restart: unless-stopped
    command: >
      redis-server --requirepass nerve_redis_secret --maxmemory 512mb
        --maxmemory-policy allkeys-lru --save 900 1 --save 300 10
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "nerve_redis_secret", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - nerve
    logging: *default-logging

  redis-replica-1:
    image: redis:7.2-alpine
    container_name: nerve-redis-replica-1
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    command: >
      redis-server --requirepass nerve_redis_secret --masterauth nerve_redis_secret
        --replicaof redis 6379 --replica-read-only yes
    networks:
      - nerve
    logging: *default-logging

  redis-replica-2:
    image: redis:7.2-alpine
    container_name: nerve-redis-replica-2
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    command: >
      redis-server --requirepass nerve_redis_secret --masterauth nerve_redis_secret
        --replicaof redis 6379 --replica-read-only yes
    networks:
      - nerve
    logging: *default-logging

  redis-sentinel:
    image: redis:7.2-alpine
    container_name: nerve-sentinel
    restart: unless-stopped
    depends_on:
      - redis-replica-1
      - redis-replica-2
    command: >
      sh -c "
        echo 'sentinel monitor nerve-master redis 6379 2' > /tmp/sentinel.conf &&
        echo 'sentinel auth-pass nerve-master nerve_redis_secret' >> /tmp/sentinel.conf &&
        echo 'sentinel down-after-milliseconds nerve-master 5000' >> /tmp/sentinel.conf &&
        echo 'sentinel failover-timeout nerve-master 60000' >> /tmp/sentinel.conf &&
        redis-sentinel /tmp/sentinel.conf
      "
    ports:
      - "26379:26379"
    networks:
      - nerve
    logging: *default-logging

  neo4j:
    image: neo4j:5.18-community
    container_name: nerve-neo4j
    restart: unless-stopped
    environment:
      NEO4J_AUTH: neo4j/nerve_neo4j_secret
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_server_memory_heap_initial__size: 512m
      NEO4J_server_memory_heap_max__size: 1G
      NEO4J_server_memory_pagecache__size: 512m
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - ./phase-1/infra/docker/neo4j/init.cypher:/var/lib/neo4j/import/init.cypher:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -O /dev/null -q http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 20
      start_period: 30s
    networks:
      - nerve
    logging: *default-logging

  vault:
    image: hashicorp/vault:1.16
    container_name: nerve-vault
    restart: unless-stopped
    cap_add:
      - IPC_LOCK
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: ${VAULT_TOKEN:-nerve-vault-dev-token}
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    command: vault server -dev
    ports:
      - "8200:8200"
    volumes:
      - vault_data:/vault/data
    healthcheck:
      test: ["CMD-SHELL", "vault status -address=http://localhost:8200 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - nerve
    logging: *default-logging

  temporal:
    image: temporalio/auto-setup:1.24.2
    container_name: nerve-temporal
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - DB=postgresql
      - DB_PORT=5432
      - POSTGRES_USER=nerve
      - POSTGRES_PWD=nerve_dev_secret
      - POSTGRES_SEEDS=postgres
      - DYNAMIC_CONFIG_FILE_PATH=config/dynamicconfig/development-sql.yaml
    ports:
      - "7233:7233"
    volumes:
      - ./phase-1/infra/docker/temporal/dynamicconfig:/etc/temporal/config/dynamicconfig:ro
    healthcheck:
      test: ["CMD", "temporal", "workflow", "list", "--namespace", "default", "--address", "localhost:7233"]
      interval: 10s
      timeout: 10s
      retries: 20
      start_period: 30s
    networks:
      - nerve
    logging: *default-logging

  temporal-ui:
    image: temporalio/ui:2.27.3
    container_name: nerve-temporal-ui
    restart: unless-stopped
    depends_on:
      - temporal
    environment:
      TEMPORAL_ADDRESS: temporal:7233
    ports:
      - "8088:8080"
    networks:
      - nerve
    logging: *default-logging

  opa:
    image: openpolicyagent/opa:0.64.1-rootless
    container_name: nerve-opa
    restart: unless-stopped
    command:
      - "run"
      - "--server"
      - "--addr=0.0.0.0:8181"
      - "--log-level=info"
      - "--watch"
      - "/policies"
    volumes:
      - ./phase-2/policies/rego:/policies:ro
    ports:
      - "8181:8181"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8181/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - nerve
    logging: *default-logging

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.99.0
    container_name: nerve-otel-collector
    restart: unless-stopped
    command: ["--config=/etc/otel/config.yaml"]
    volumes:
      - ./phase-1/infra/docker/otel/config.yaml:/etc/otel/config.yaml:ro
    ports:
      - "4317:4317"
      - "4318:4318"
      - "8889:8889"
    networks:
      - nerve
    logging: *default-logging

  jaeger:
    image: jaegertracing/all-in-one:1.57
    container_name: nerve-jaeger
    restart: unless-stopped
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"
    networks:
      - nerve
    logging: *default-logging

  prometheus:
    image: prom/prometheus:v2.51.2
    container_name: nerve-prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yaml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"
    volumes:
      - ./phase-1/infra/docker/prometheus/prometheus.yaml:/etc/prometheus/prometheus.yaml:ro
      - ./phase-1/infra/docker/prometheus/rules:/etc/prometheus/rules:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - nerve
    logging: *default-logging

  grafana:
    image: grafana/grafana:10.4.2
    container_name: nerve-grafana
    restart: unless-stopped
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: nerve_grafana_secret
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./phase-1/infra/docker/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3000:3000"
    networks:
      - nerve
    logging: *default-logging

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: nerve-alertmanager
    restart: unless-stopped
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yaml"
      - "--storage.path=/alertmanager"
    volumes:
      - ./phase-1/infra/docker/alertmanager/alertmanager.yaml:/etc/alertmanager/alertmanager.yaml:ro
    ports:
      - "9093:9093"
    networks:
      - nerve
    logging: *default-logging

  # ═══════════════════════════════════════════
  # PHASE 2 — APPLICATION SERVICES
  # ═══════════════════════════════════════════

  gateway:
    build:
      context: ./phase-2/backend/gateway
      dockerfile: Dockerfile
    container_name: nerve-gateway
    restart: unless-stopped
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
      opa:
        condition: service_healthy
      catalog:
        condition: service_healthy
      enforcer:
        condition: service_healthy
    environment:
      <<: *app-env
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - nerve
    logging: *default-logging

  catalog:
    build:
      context: ./phase-2/backend/services/catalog
      dockerfile: Dockerfile
    container_name: nerve-catalog
    restart: unless-stopped
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    environment:
      <<: *app-env
    ports:
      - "8001:8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - nerve
    logging: *default-logging

  enforcer:
    build:
      context: ./phase-2/backend/services/enforcer
      dockerfile: Dockerfile
    container_name: nerve-enforcer
    restart: unless-stopped
    depends_on:
      opa:
        condition: service_healthy
      pgbouncer:
        condition: service_healthy
      catalog:
        condition: service_healthy
    environment:
      <<: *app-env
    ports:
      - "8002:8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s
    networks:
      - nerve
    logging: *default-logging

  pipeline:
    build:
      context: ./phase-2/backend/services/pipeline
      dockerfile: Dockerfile
    container_name: nerve-pipeline
    restart: unless-stopped
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      <<: *app-env
    ports:
      - "8003:8000"
    networks:
      - nerve
    logging: *default-logging

  worker-dora:
    build:
      context: ./phase-2/backend/services/pipeline
      dockerfile: Dockerfile
    container_name: nerve-worker-dora
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      pgbouncer:
        condition: service_healthy
    command: celery -A app.workers.dora.celery_app worker --loglevel=info --queues=dora --concurrency=2
    environment:
      <<: *app-env
    networks:
      - nerve
    logging: *default-logging

  temporal-worker-scaffold:
    build:
      context: ./phase-2/workflows/temporal
      dockerfile: Dockerfile
    container_name: nerve-temporal-worker-scaffold
    restart: unless-stopped
    depends_on:
      temporal:
        condition: service_healthy
    command: python worker.py --queue nerve-scaffold
    environment:
      <<: *app-env
    networks:
      - nerve
    logging: *default-logging

  temporal-worker-iac:
    build:
      context: ./phase-2/workflows/temporal
      dockerfile: Dockerfile
    container_name: nerve-temporal-worker-iac
    restart: unless-stopped
    depends_on:
      temporal:
        condition: service_healthy
    command: python worker.py --queue nerve-iac
    environment:
      <<: *app-env
    networks:
      - nerve
    logging: *default-logging

  # ═══════════════════════════════════════════
  # PHASE 3 — DIFFERENTIATOR SERVICES
  # ═══════════════════════════════════════════

  blast-radius:
    build:
      context: ./phase-3/backend/services/blast-radius
      dockerfile: Dockerfile
    container_name: nerve-blast-radius
    restart: unless-stopped
    depends_on:
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      <<: *app-env
    ports:
      - "8004:8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - nerve
    logging: *default-logging

  error-budget:
    build:
      context: ./phase-3/backend/services/error-budget
      dockerfile: Dockerfile
    container_name: nerve-error-budget
    restart: unless-stopped
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      <<: *app-env
    ports:
      - "8005:8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - nerve
    logging: *default-logging

  cost-intelligence:
    build:
      context: ./phase-3/backend/services/cost-intelligence
      dockerfile: Dockerfile
    container_name: nerve-cost-intelligence
    restart: unless-stopped
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      <<: *app-env
    ports:
      - "8006:8000"
    networks:
      - nerve
    logging: *default-logging

  maturity:
    build:
      context: ./phase-3/backend/services/maturity
      dockerfile: Dockerfile
    container_name: nerve-maturity
    restart: unless-stopped
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      <<: *app-env
    ports:
      - "8007:8000"
    networks:
      - nerve
    logging: *default-logging

  security:
    build:
      context: ./phase-3/backend/services/security
      dockerfile: Dockerfile
    container_name: nerve-security
    restart: unless-stopped
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      <<: *app-env
    ports:
      - "8008:8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - nerve
    logging: *default-logging

  worker-cost:
    build:
      context: ./phase-3/backend/services/cost-intelligence
      dockerfile: Dockerfile
    container_name: nerve-worker-cost
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      pgbouncer:
        condition: service_healthy
    command: celery -A app.workers.cost.celery_app worker --beat --loglevel=info --queues=cost --concurrency=1
    environment:
      <<: *app-env
    networks:
      - nerve
    logging: *default-logging

  worker-maturity:
    build:
      context: ./phase-3/backend/services/maturity
      dockerfile: Dockerfile
    container_name: nerve-worker-maturity
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      pgbouncer:
        condition: service_healthy
    command: celery -A app.main.celery_app worker --loglevel=info --queues=maturity --concurrency=2
    environment:
      <<: *app-env
    networks:
      - nerve
    logging: *default-logging

  # ═══════════════════════════════════════════
  # PHASE 4 — WOW LAYER
  # ═══════════════════════════════════════════

  ai-copilot:
    build:
      context: ./phase-4/backend/services/ai-copilot
      dockerfile: Dockerfile
    container_name: nerve-ai-copilot
    restart: unless-stopped
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      <<: *app-env
    ports:
      - "8009:8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - nerve
    logging: *default-logging

  docs-service:
    build:
      context: ./phase-4/backend/services/docs
      dockerfile: Dockerfile
    container_name: nerve-docs
    restart: unless-stopped
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      <<: *app-env
    ports:
      - "8010:8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - nerve
    logging: *default-logging

  chaos:
    build:
      context: ./phase-4/backend/services/chaos
      dockerfile: Dockerfile
    container_name: nerve-chaos
    restart: unless-stopped
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
      temporal:
        condition: service_healthy
    environment:
      <<: *app-env
    ports:
      - "8011:8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - nerve
    logging: *default-logging

  fleet:
    build:
      context: ./phase-4/backend/services/fleet
      dockerfile: Dockerfile
    container_name: nerve-fleet
    restart: unless-stopped
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      <<: *app-env
    ports:
      - "8012:8000"
    networks:
      - nerve
    logging: *default-logging

  temporal-worker-runbooks:
    build:
      context: ./phase-4/workflows/temporal
      dockerfile: Dockerfile
    container_name: nerve-temporal-worker-runbooks
    restart: unless-stopped
    depends_on:
      temporal:
        condition: service_healthy
    command: python worker.py --queue nerve-runbooks
    environment:
      <<: *app-env
    networks:
      - nerve
