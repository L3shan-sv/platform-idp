[alembic]
script_location = alembic
file_template = %%(rev)s_%%(slug)s
truncate_slug_length = 40
timezone = UTC
prepend_sys_path = .

# CRITICAL: Always use DATABASE_URL_MIGRATIONS (direct PostgreSQL, port 5432)
# NEVER use the PgBouncer URL (port 6432) for migrations
# DDL transactions are incompatible with PgBouncer transaction mode
sqlalchemy.url = postgresql+psycopg2://nerve:nerve_dev_secret@localhost:5432/nerve

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
