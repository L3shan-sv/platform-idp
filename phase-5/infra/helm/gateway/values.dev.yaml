replicaCount: 1
autoscaling:
  enabled: false
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi
env:
  ENVIRONMENT: development
  LOG_LEVEL: DEBUG
ingress:
  hosts:
    - host: nerve.dev.internal
      paths:
        - path: /
          pathType: Prefix
