global:
  resolve_timeout: 5m

route:
  group_by: ["alertname", "service", "team"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: slack-default
  routes:
    - matchers:
        - action = "freeze_deploys"
      receiver: freeze-and-page
      continue: false
      group_wait: 0s
    - matchers:
        - severity = "page"
      receiver: pagerduty-page
    - matchers:
        - severity = "warning"
      receiver: slack-default

receivers:
  - name: freeze-and-page
    webhook_configs:
      - url: "http://error-budget:8000/internal/error-budget/freeze"
        send_resolved: false
        max_alerts: 1

  - name: pagerduty-page
    slack_configs:
      - channel: "#nerve-alerts"
        text: "{{ .CommonAnnotations.summary }}"

  - name: slack-default
    slack_configs:
      - channel: "#nerve-alerts"
        text: "{{ .CommonAnnotations.summary }}"

inhibit_rules:
  - source_matchers:
      - alertname = "NerveBudgetExhausted"
    target_matchers:
      - alertname =~ "NerveBurnRate.*"
    equal: ["service"]
