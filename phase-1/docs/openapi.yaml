openapi: 3.1.0
info:
  title: Nerve IDP API
  version: 1.0.0
  description: |
    Internal Developer Platform — contract-first API specification.
    All backend services implement against this spec.
    All frontend React Query hooks are typed against these schemas.
    Do not add endpoints without updating this file first.

servers:
  - url: http://localhost:8000/api/v1
    description: Local development
  - url: https://nerve.internal/api/v1
    description: Production

tags:
  - name: health
  - name: auth
  - name: catalog
  - name: deploy
  - name: scaffold
  - name: iac
  - name: pipelines
  - name: observability
  - name: cost
  - name: security
  - name: blast-radius
  - name: fleet
  - name: runbooks
  - name: ai
  - name: docs
  - name: chaos
  - name: teams

paths:

  /health:
    get:
      tags: [health]
      summary: Liveness check
      operationId: healthCheck
      security: []
      responses:
        "200":
          description: Gateway is live
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /health/ready:
    get:
      tags: [health]
      summary: Readiness check — all dependencies healthy
      operationId: readinessCheck
      security: []
      responses:
        "200":
          description: All dependencies ready
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadinessResponse"
        "503":
          description: One or more dependencies not ready
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadinessResponse"

  /auth/token:
    post:
      tags: [auth]
      summary: Issue JWT token
      operationId: issueToken
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TokenRequest"
      responses:
        "200":
          description: JWT issued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /services:
    get:
      tags: [catalog]
      summary: List services with filters and pagination
      operationId: listServices
      parameters:
        - $ref: "#/components/parameters/TeamFilter"
        - $ref: "#/components/parameters/LanguageFilter"
        - $ref: "#/components/parameters/HealthFilter"
        - $ref: "#/components/parameters/SearchQuery"
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/LimitParam"
        - name: sort_by
          in: query
          schema:
            type: string
            enum: [name, maturity_score, error_budget, last_deploy_at, team]
            default: name
      responses:
        "200":
          description: Paginated service list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServiceListResponse"
    post:
      tags: [catalog]
      summary: Register a new service
      operationId: registerService
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ServiceRegistration"
      responses:
        "201":
          description: Service registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Service"
        "409":
          description: Service name already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /services/{serviceId}:
    get:
      tags: [catalog]
      summary: Get full service detail
      operationId: getService
      parameters:
        - $ref: "#/components/parameters/ServiceId"
      responses:
        "200":
          description: Service detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServiceDetail"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      tags: [catalog]
      summary: Update service metadata
      operationId: updateService
      parameters:
        - $ref: "#/components/parameters/ServiceId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ServiceUpdate"
      responses:
        "200":
          description: Updated service
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Service"
    delete:
      tags: [catalog]
      summary: Soft delete a service
      operationId: deleteService
      parameters:
        - $ref: "#/components/parameters/ServiceId"
      responses:
        "204":
          description: Service deregistered

  /services/{serviceId}/slo:
    get:
      tags: [catalog]
      summary: Get SLO definition
      operationId: getServiceSlo
      parameters:
        - $ref: "#/components/parameters/ServiceId"
      responses:
        "200":
          description: SLO definition
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SloDefinition"
    put:
      tags: [catalog]
      summary: Create or update SLO definition
      operationId: upsertServiceSlo
      parameters:
        - $ref: "#/components/parameters/ServiceId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SloDefinitionInput"
      responses:
        "200":
          description: SLO updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SloDefinition"

  /services/{serviceId}/changelog:
    get:
      tags: [catalog]
      summary: Get release changelog
      operationId: getServiceChangelog
      parameters:
        - $ref: "#/components/parameters/ServiceId"
        - $ref: "#/components/parameters/LimitParam"
      responses:
        "200":
          description: Changelog entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ChangelogEntry"

  /services/{serviceId}/blast-radius:
    get:
      tags: [blast-radius]
      summary: Compute blast radius via Neo4j (up to 5 hops)
      operationId: getBlastRadius
      parameters:
        - $ref: "#/components/parameters/ServiceId"
        - name: hops
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 5
            default: 5
      responses:
        "200":
          description: Dependency subgraph with risk assessment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BlastRadiusResponse"

  /services/{serviceId}/dependency-health:
    get:
      tags: [blast-radius]
      summary: Pre-deploy dependency health risk score
      operationId: getDependencyHealth
      parameters:
        - $ref: "#/components/parameters/ServiceId"
      responses:
        "200":
          description: Upstream dependency risk assessment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DependencyHealthResponse"

  /services/{serviceId}/deploy:
    post:
      tags: [deploy]
      summary: Submit deploy — OPA evaluation, blocks if score < 80
      operationId: submitDeploy
      parameters:
        - $ref: "#/components/parameters/ServiceId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeployRequest"
      responses:
        "202":
          description: Deploy accepted and queued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeployResponse"
        "403":
          description: OPA compliance check failed (score < 80 or Critical CVE)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ComplianceFailureResponse"
        "423":
          description: Service deploy frozen (error budget exhausted)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeployFrozenResponse"

  /services/{serviceId}/compliance:
    get:
      tags: [deploy]
      summary: Run OPA compliance evaluation without deploying
      operationId: evaluateCompliance
      parameters:
        - $ref: "#/components/parameters/ServiceId"
        - name: version
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Compliance report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ComplianceReport"

  /services/{serviceId}/deploy/history:
    get:
      tags: [deploy]
      summary: Get deploy history
      operationId: getDeployHistory
      parameters:
        - $ref: "#/components/parameters/ServiceId"
        - $ref: "#/components/parameters/LimitParam"
      responses:
        "200":
          description: Deploy history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DeployHistoryEntry"

  /scaffold:
    post:
      tags: [scaffold]
      summary: Scaffold a new service (triggers Temporal ScaffoldWorkflow)
      operationId: scaffoldService
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ScaffoldRequest"
      responses:
        "202":
          description: Scaffold workflow started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScaffoldResponse"

  /scaffold/{workflowId}:
    get:
      tags: [scaffold]
      summary: Poll scaffold workflow status
      operationId: getScaffoldStatus
      parameters:
        - name: workflowId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Scaffold status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScaffoldStatus"

  /scaffold/templates:
    get:
      tags: [scaffold]
      summary: List available scaffold templates
      operationId: listScaffoldTemplates
      responses:
        "200":
          description: Templates
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ScaffoldTemplate"

  /iac/requests:
    get:
      tags: [iac]
      summary: List IaC change requests
      operationId: listIacRequests
      parameters:
        - $ref: "#/components/parameters/TeamFilter"
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, approved, applying, applied, failed, rejected]
      responses:
        "200":
          description: IaC requests
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/IacRequest"
    post:
      tags: [iac]
      summary: Submit IaC change request
      operationId: submitIacRequest
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IacRequestInput"
      responses:
        "202":
          description: IaC plan started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IacRequest"
        "402":
          description: Team quota exceeded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuotaExceededResponse"

  /iac/requests/{requestId}/approve:
    post:
      tags: [iac]
      summary: Approve IaC request — sends Temporal signal
      operationId: approveIacRequest
      parameters:
        - name: requestId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "202":
          description: Apply workflow signalled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IacRequest"

  /services/{serviceId}/pipelines:
    get:
      tags: [pipelines]
      summary: List pipeline runs
      operationId: listPipelineRuns
      parameters:
        - $ref: "#/components/parameters/ServiceId"
        - $ref: "#/components/parameters/LimitParam"
      responses:
        "200":
          description: Pipeline runs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PipelineRun"

  /metrics/dora:
    get:
      tags: [observability]
      summary: DORA metrics — platform-wide or per team
      operationId: getDoraMetrics
      parameters:
        - $ref: "#/components/parameters/TeamFilter"
        - $ref: "#/components/parameters/WindowParam"
      responses:
        "200":
          description: DORA metrics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DoraMetrics"

  /services/{serviceId}/error-budget:
    get:
      tags: [observability]
      summary: Current error budget state with multi-window burn rates
      operationId: getErrorBudget
      parameters:
        - $ref: "#/components/parameters/ServiceId"
      responses:
        "200":
          description: Error budget state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBudget"

  /services/{serviceId}/error-budget/freeze:
    post:
      tags: [observability]
      summary: Freeze deploys — called by Alertmanager webhook
      operationId: freezeServiceDeploys
      parameters:
        - $ref: "#/components/parameters/ServiceId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FreezeRequest"
      responses:
        "200":
          description: Freeze response (idempotent)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FreezeResponse"

  /services/{serviceId}/error-budget/unfreeze:
    post:
      tags: [observability]
      summary: SRE manual unfreeze — requires sre role
      operationId: unfreezeServiceDeploys
      parameters:
        - $ref: "#/components/parameters/ServiceId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reason]
              properties:
                reason:
                  type: string
      responses:
        "200":
          description: Unfreeze response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FreezeResponse"

  /services/{serviceId}/maturity:
    get:
      tags: [observability]
      summary: Maturity score breakdown across 6 pillars
      operationId: getMaturityScore
      parameters:
        - $ref: "#/components/parameters/ServiceId"
      responses:
        "200":
          description: Maturity score detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MaturityScore"

  /services/{serviceId}/cost:
    get:
      tags: [cost]
      summary: Per-service cloud spend with anomaly flag
      operationId: getServiceCost
      parameters:
        - $ref: "#/components/parameters/ServiceId"
        - $ref: "#/components/parameters/WindowParam"
      responses:
        "200":
          description: Service cost data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServiceCost"

  /teams/{teamId}/cost:
    get:
      tags: [cost]
      summary: Team cost rollup with budget vs actual
      operationId: getTeamCost
      parameters:
        - name: teamId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Team cost rollup
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeamCost"

  /services/{serviceId}/security:
    get:
      tags: [security]
      summary: Security posture — CVEs, SBOM, SAST
      operationId: getSecurityPosture
      parameters:
        - $ref: "#/components/parameters/ServiceId"
      responses:
        "200":
          description: Security posture
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SecurityPosture"

  /security/webhooks/trivy:
    post:
      tags: [security]
      summary: Trivy scan results webhook — called from GitHub Actions
      operationId: receiveTrivyResults
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TrivyWebhookPayload"
      responses:
        "200":
          description: Results ingested

  /fleet/collections:
    get:
      tags: [fleet]
      summary: List service collections
      operationId: listCollections
      responses:
        "200":
          description: Collections
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Collection"
    post:
      tags: [fleet]
      summary: Create a service collection
      operationId: createCollection
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CollectionInput"
      responses:
        "201":
          description: Collection created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Collection"

  /fleet/collections/{collectionId}/operations:
    post:
      tags: [fleet]
      summary: Submit bulk operation across collection
      operationId: submitFleetOperation
      parameters:
        - $ref: "#/components/parameters/CollectionId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FleetOperationRequest"
      responses:
        "202":
          description: Fleet operation started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FleetOperation"

  /runbooks/{runbookId}/execute:
    post:
      tags: [runbooks]
      summary: Execute runbook via Temporal RemediationWorkflow
      operationId: executeRunbook
      parameters:
        - name: runbookId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RunbookExecutionRequest"
      responses:
        "202":
          description: Execution started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RunbookExecution"

  /ai/chat:
    post:
      tags: [ai]
      summary: AI ops co-pilot chat
      operationId: aiChat
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AiChatRequest"
      responses:
        "200":
          description: AI response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiChatResponse"

  /docs/{serviceId}:
    get:
      tags: [docs]
      summary: Serve TechDocs page
      operationId: getServiceDocs
      parameters:
        - $ref: "#/components/parameters/ServiceId"
      responses:
        "200":
          description: TechDocs HTML
          content:
            text/html:
              schema:
                type: string

  /docs/search:
    get:
      tags: [docs]
      summary: Semantic + full-text TechDocs search
      operationId: searchDocs
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
        - name: mode
          in: query
          schema:
            type: string
            enum: [semantic, fulltext, hybrid]
            default: hybrid
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DocsSearchResult"

  /chaos/experiments:
    post:
      tags: [chaos]
      summary: Create chaos experiment (requires approval)
      operationId: createChaosExperiment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChaosExperimentRequest"
      responses:
        "202":
          description: Experiment queued for approval
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChaosExperiment"

  /teams/{teamId}/quota:
    get:
      tags: [teams]
      summary: Get team resource quota and consumption
      operationId: getTeamQuota
      parameters:
        - name: teamId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Team quota
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeamQuota"

  /audit:
    get:
      tags: [health]
      summary: Query audit log
      operationId: queryAuditLog
      parameters:
        - name: actor
          in: query
          schema:
            type: string
        - name: resource_type
          in: query
          schema:
            type: string
        - $ref: "#/components/parameters/LimitParam"
        - $ref: "#/components/parameters/PageParam"
      responses:
        "200":
          description: Audit log entries
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditLogResponse"

  /policies:
    get:
      tags: [deploy]
      summary: List active OPA policies with weights (read-only)
      operationId: listPolicies
      responses:
        "200":
          description: Active policies
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PolicyDefinition"

# WebSocket endpoints (documented as comments — not in OpenAPI 3.1 spec)
# WS /ws/topology            — TopologyEvent stream
# WS /ws/pipelines/{svcId}  — PipelineStageEvent stream
# WS /ws/fleet/{opId}       — FleetProgressEvent stream
# WS /ws/error-budget/{id}  — BurnRateEvent stream

# GraphQL endpoint
# POST /graphql — Service catalog + topology queries (read-only)

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    ServiceId:
      name: serviceId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    CollectionId:
      name: collectionId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    TeamFilter:
      name: team
      in: query
      schema:
        type: string
    LanguageFilter:
      name: language
      in: query
      schema:
        type: string
        enum: [python, go, typescript, rust, java]
    HealthFilter:
      name: health
      in: query
      schema:
        type: string
        enum: [healthy, degraded, frozen, unknown]
    SearchQuery:
      name: q
      in: query
      schema:
        type: string
    PageParam:
      name: page
      in: query
      schema:
        type: integer
        default: 1
        minimum: 1
    LimitParam:
      name: limit
      in: query
      schema:
        type: integer
        default: 20
        minimum: 1
        maximum: 100
    WindowParam:
      name: window
      in: query
      schema:
        type: string
        enum: [7d, 14d, 30d, 90d]
        default: 30d

  responses:
    Unauthorized:
      description: Missing or invalid JWT
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Forbidden:
      description: Insufficient RBAC role
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  schemas:

    Service:
      type: object
      required: [id, name, team, language, health_status, compliance_score, maturity_score, error_budget_consumed, deploy_frozen, replica_count, created_at]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        team:
          type: string
        language:
          type: string
          enum: [python, go, typescript, rust, java]
        version:
          type: string
        repo_url:
          type: string
        health_status:
          type: string
          enum: [healthy, degraded, frozen, unknown]
        compliance_score:
          type: integer
          minimum: 0
          maximum: 100
        maturity_score:
          type: integer
          minimum: 0
          maximum: 100
        error_budget_consumed:
          type: number
          minimum: 0
          maximum: 100
        deploy_frozen:
          type: boolean
        replica_count:
          type: integer
        template_version:
          type: string
        last_deploy_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    ServiceDetail:
      allOf:
        - $ref: "#/components/schemas/Service"
        - type: object
          properties:
            description:
              type: string
            slo:
              $ref: "#/components/schemas/SloDefinition"
            upstream_dependencies:
              type: array
              items:
                type: string
            downstream_dependents:
              type: array
              items:
                type: string

    ServiceListResponse:
      type: object
      required: [items, total, page, limit]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Service"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
        summary:
          $ref: "#/components/schemas/CatalogSummary"

    CatalogSummary:
      type: object
      properties:
        total_services:
          type: integer
        healthy:
          type: integer
        degraded:
          type: integer
        frozen:
          type: integer
        avg_maturity_score:
          type: number
        critical_cves:
          type: integer

    ServiceRegistration:
      type: object
      required: [name, team, language]
      properties:
        name:
          type: string
          pattern: "^[a-z][a-z0-9-]{2,62}$"
        team:
          type: string
        language:
          type: string
